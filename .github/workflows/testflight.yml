name: TestFlight

on:
  push:
    tags:
      - "v*"

# Never cancel a signed upload after it has started. A manual rerun receives a
# distinct build number through GITHUB_RUN_ATTEMPT.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate_tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      marketing_version: ${{ steps.version.outputs.marketing_version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Derive version and build number
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-beta\.([0-9]+))?$ ]]; then
            marketing_version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          else
            echo "::error::Tag must be vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-beta.NUMBER"
            exit 1
          fi

          build_number="${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          echo "marketing_version=$marketing_version" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "Validated $GITHUB_REF_NAME as version $marketing_version (build $build_number)"

  test:
    name: Build & test
    needs: validate_tag
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - name: Verify Xcode version
        run: |
          xcodebuild -version
          test "$(xcodebuild -version | sed -n '1s/^Xcode //p')" = "26.6"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Signing credentials are not available to this job. A test failure
      # prevents the protected TestFlight environment from being entered.
      - name: Run unit tests
        run: scripts/xbuild.sh test

  release:
    name: Archive & upload
    needs: [validate_tag, test]
    runs-on: macos-26
    environment: testflight
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
      MARKETING_VERSION: ${{ needs.validate_tag.outputs.marketing_version }}
      BUILD_NUMBER: ${{ needs.validate_tag.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify Xcode version
        run: |
          xcodebuild -version
          test "$(xcodebuild -version | sed -n '1s/^Xcode //p')" = "26.6"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # The `runner` expression context is unavailable in job-level `env`.
      # Resolve GitHub's runtime RUNNER_TEMP path after the runner starts and
      # publish the derived paths for all subsequent steps.
      - name: Configure temporary paths
        run: |
          echo "ARCHIVE_PATH=$RUNNER_TEMP/Hybridge.xcarchive" >> "$GITHUB_ENV"
          echo "EXPORT_PATH=$RUNNER_TEMP/export" >> "$GITHUB_ENV"
          echo "ARTIFACT_PATH=$RUNNER_TEMP/artifacts" >> "$GITHUB_ENV"
          echo "CERTIFICATE_PATH=$RUNNER_TEMP/apple-distribution.p12" >> "$GITHUB_ENV"
          echo "DEV_CERTIFICATE_PATH=$RUNNER_TEMP/apple-development.p12" >> "$GITHUB_ENV"
          echo "API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$RUNNER_TEMP/testflight-signing.keychain-db" >> "$GITHUB_ENV"

      - name: Import signing credentials
        env:
          DISTRIBUTION_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_P12_BASE64 }}
          DISTRIBUTION_P12_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_P12_PASSWORD }}
          DEVELOPMENT_P12_BASE64: ${{ secrets.APPLE_DEVELOPMENT_P12_BASE64 }}
          DEVELOPMENT_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPMENT_P12_PASSWORD }}
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          keychain_password="$(openssl rand -base64 32)"

          printf '%s' "$DISTRIBUTION_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          printf '%s' "$DEVELOPMENT_P12_BASE64" | base64 --decode > "$DEV_CERTIFICATE_PATH"
          printf '%s' "$API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          chmod 600 "$CERTIFICATE_PATH" "$DEV_CERTIFICATE_PATH" "$API_KEY_PATH"

          security create-keychain -p "$keychain_password" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$keychain_password" "$KEYCHAIN_PATH"
          # The App Store *archive* is signed with an Apple Development identity
          # (xcodebuild then re-signs the exported IPA with the managed Apple
          # Distribution cert). Importing an existing development cert means
          # -allowProvisioningUpdates does not try to *create* one — which is
          # what hit the account's certificate limit ("Revoke certificate")
          # and drove the earlier switch to manual signing.
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$DISTRIBUTION_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security import "$DEV_CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPMENT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Create App Store archive
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          # Automatic signing (the project default). With both an Apple
          # Development and an Apple Distribution cert already in the keychain,
          # -allowProvisioningUpdates only creates/downloads the managed
          # *profiles* for each target's App ID and signs the archive with the
          # development identity — it does not try to create a certificate, so
          # the account's cert limit is never touched. Export then re-signs the
          # IPA with the distribution cert (signingStyle=automatic in the export
          # options). Manual signing was a dead end here: it needs a
          # per-target PROVISIONING_PROFILE_SPECIFIER pointing at profiles that
          # already exist on the portal, and -allowProvisioningUpdates will not
          # create profiles for manually signed targets.
          xcodebuild archive \
            -project Hybridge.xcodeproj \
            -scheme Hybridge \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Verify archived products and entitlements
        run: |
          set -euo pipefail
          app="$ARCHIVE_PATH/Products/Applications/Hybridge.app"
          widget="$app/PlugIns/HybridgeWidgets.appex"
          app_entitlements="$RUNNER_TEMP/app-entitlements.plist"
          widget_entitlements="$RUNNER_TEMP/widget-entitlements.plist"

          test -d "$app"
          test -d "$widget"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app/Info.plist")" = "eu.sixpixels.hybridge"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$widget/Info.plist")" = "eu.sixpixels.hybridge.widgets"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app/Info.plist")" = "$MARKETING_VERSION"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$app/Info.plist")" = "$BUILD_NUMBER"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$widget/Info.plist")" = "$MARKETING_VERSION"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$widget/Info.plist")" = "$BUILD_NUMBER"

          codesign --verify --strict --verbose=2 "$app"
          codesign --verify --strict --verbose=2 "$widget"
          codesign -d --entitlements :- "$app" > "$app_entitlements"
          codesign -d --entitlements :- "$widget" > "$widget_entitlements"

          test "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.developer.healthkit' "$app_entitlements")" = "true"
          test "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.developer.weatherkit' "$app_entitlements")" = "true"
          test "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.security.application-groups:0' "$app_entitlements")" = "group.eu.sixpixels.hybridge"
          test "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.security.application-groups:0' "$widget_entitlements")" = "group.eu.sixpixels.hybridge"

      - name: Export IPA and archive artifact
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p "$EXPORT_PATH" "$ARTIFACT_PATH"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ci/TestFlightExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"

          ipa_files=("$EXPORT_PATH"/*.ipa)
          test "${#ipa_files[@]}" -eq 1
          cp "${ipa_files[0]}" "$ARTIFACT_PATH/Hybridge-$MARKETING_VERSION-$BUILD_NUMBER.ipa"
          ditto -c -k --keepParent \
            "$ARCHIVE_PATH" \
            "$ARTIFACT_PATH/Hybridge-$MARKETING_VERSION-$BUILD_NUMBER.xcarchive.zip"

      - name: Upload archive to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          upload_options="$RUNNER_TEMP/TestFlightUploadOptions.plist"
          cp ci/TestFlightExportOptions.plist "$upload_options"
          /usr/libexec/PlistBuddy -c 'Add :destination string upload' "$upload_options"
          mkdir -p "$RUNNER_TEMP/upload"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$RUNNER_TEMP/upload" \
            -exportOptionsPlist "$upload_options" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"

      - name: Retain signed release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Hybridge-${{ env.MARKETING_VERSION }}-${{ env.BUILD_NUMBER }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
          retention-days: 90

      - name: Remove signing credentials
        if: ${{ always() }}
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$CERTIFICATE_PATH" "$DEV_CERTIFICATE_PATH" "$API_KEY_PATH"
